<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Element to Webflow</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #111827;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --accent: #06b6d4;
        --accent-strong: #22d3ee;
        --border: #1f2937;
        --ok: #10b981;
        --warn: #f59e0b;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        width: 340px;
        min-height: 360px;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 10% 10%, #1e293b 0%, var(--bg) 45%, #020617 100%);
      }
      .wrap {
        padding: 14px;
      }
      .title {
        margin: 0;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.2px;
      }
      .subtitle {
        margin: 4px 0 14px;
        color: var(--muted);
        font-size: 12px;
      }
      .panel {
        border: 1px solid var(--border);
        border-radius: 12px;
        background: linear-gradient(180deg, #0b1220 0%, var(--panel) 100%);
        padding: 10px;
        margin-bottom: 10px;
      }
      .btn {
        width: 100%;
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: 120ms ease;
      }
      .btn + .btn {
        margin-top: 8px;
      }
      .btn-primary {
        background: linear-gradient(90deg, var(--accent) 0%, var(--accent-strong) 100%);
        color: #05252b;
      }
      .btn-primary:hover {
        filter: brightness(1.05);
      }
      .btn-secondary {
        background: #111827;
        color: #cbd5e1;
        border-color: #334155;
      }
      .btn-secondary:hover {
        border-color: var(--accent);
        color: #e2e8f0;
      }
      .status {
        min-height: 50px;
        border-radius: 10px;
        border: 1px dashed #334155;
        padding: 10px;
        font-size: 12px;
        color: var(--muted);
        line-height: 1.5;
      }
      .status.ok {
        color: #d1fae5;
        border-color: rgba(16, 185, 129, 0.5);
        background: rgba(16, 185, 129, 0.08);
      }
      .status.warn {
        color: #fef3c7;
        border-color: rgba(245, 158, 11, 0.5);
        background: rgba(245, 158, 11, 0.08);
      }
      .kbd {
        display: inline-block;
        padding: 0 5px;
        border-radius: 4px;
        border: 1px solid #334155;
        background: #0b1220;
        color: #cbd5e1;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .meta {
        margin-top: 10px;
        font-size: 11px;
        color: #64748b;
      }
      .row {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1 class="title">Element to Webflow</h1>
      <p class="subtitle">Copy rendered DOM + computed styles into Webflow clipboard format.</p>
      <section class="panel">
        <button id="selectBtn" class="btn btn-primary">Select Element</button>
        <button id="copyBtn" class="btn btn-secondary">Copy for Webflow</button>
        <button id="testBtn" class="btn btn-secondary">Copy Minimal Test Payload</button>
      </section>
      <section id="status" class="status">
        Select an element first, then copy it to your clipboard.
      </section>
      <p class="meta">
        Picker shortcuts:
        <span class="kbd">↑</span> parent,
        <span class="kbd">↓</span> child,
        <span class="kbd">Esc</span> cancel
      </p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
